name: Build TWRP

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v3

       - name: Setup and Initialize
        run: |
          # ... (оставь всё как было: удаление мусора, apt-get, установка repo) ...
          
          mkdir workspace
          cd workspace
          repo init -u https://github.com/minimal-manifest-twrp/platform_manifest_twrp_aosp.git -b twrp-12.1 --depth=1
          repo sync -j$(nproc)
          
          # Переходим в корень репозитория
          cd ..
          
          # Создаем целевую папку
          mkdir -p workspace/device/xiaomi/frost
          
          # Копируем всё из корня в папку устройства, исключая саму папку workspace и папку .git
          # Мы используем rsync, если он есть, или просто копируем файлы по одному/масками
          find . -maxdepth 1 -not -name 'workspace' -not -name '.git' -not -name '.' -exec cp -r {} workspace/device/xiaomi/frost/ \;

      - name: Build
        run: |
          cd workspace
          export ALLOW_MISSING_DEPENDENCIES=true
          source build/envsetup.sh
          lunch twrp_frost-eng
          mka recoveryimage -j$(nproc)
